name: Run Tests in Docker

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Environment Variables
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "USER_FERNET_KEY=${{ secrets.USER_FERNET_KEY }}" >> .env

      - name: Build and Start Containers
        run: |
          docker compose up --build -d nextapp

      - name: Run Tests Inside Docker
        run: |
          docker compose run --rm tests pytest --junitxml=reports/test-results.xml --tb=short --maxfail=5

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/test-results.xml

      - name: Generate Test Summary
        run: |
          echo "## 🛠 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "$(docker compose run --rm tests pytest --tb=short --maxfail=5 --disable-warnings | tail -20)" >> $GITHUB_STEP_SUMMARY

      - name: Stop and Remove Containers
        run: docker compose down